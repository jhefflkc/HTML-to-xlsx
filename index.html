<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML a XLSX | Horarios UNI</title>
    <script>
      (function () {
        var saved = localStorage.getItem("theme");
        document.documentElement.dataset.theme = saved || "dark";
      })();
    </script>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="app-header__brand">
        <span class="app-logo">HorariosFIA</span>
        <span class="app-badge">BETA</span>
      </div>
      <button id="theme-toggle" class="theme-toggle" aria-label="Cambiar tema"></button>
    </header>

    <main class="app-shell">
      <h1 class="page-title">HTML a XLSX.</h1>

      <section class="panel">
        <label id="drop-zone" class="drop-zone" for="file-input">
          <input id="file-input" type="file" accept=".html,.htm,text/html" multiple hidden />
          <span class="drop-zone__icon">📄</span>
          <span class="drop-zone__title">Arrastra aquí tus HTML</span>
          <span class="drop-zone__subtitle">o haz clic para seleccionarlos</span>
        </label>

        <div id="message" class="message" role="status" aria-live="polite"></div>

        <div class="files-panel">
          <h2>Fuentes procesadas</h2>
          <ul id="source-list" class="source-list">
            <li class="empty-state">Todavía no hay archivos procesados.</li>
          </ul>
        </div>

        <div class="naming-section">
          <h2>Nombre del archivo</h2>
          <div class="naming-row">
            <div class="naming-field">
              <label for="faculty-select">Facultad</label>
              <select id="faculty-select">
                <option value="FIC">FIC</option>
                <option value="FIQT">FIQT</option>
                <option value="FIEECS">FIEECS</option>
                <option value="FIA" selected>FIA</option>
                <option value="FIEE">FIEE</option>
                <option value="FIIS">FIIS</option>
                <option value="FIGMM">FIGMM</option>
                <option value="FIM">FIM</option>
                <option value="FIPP">FIPP</option>
                <option value="FC">FC</option>
              </select>
            </div>
            <div class="naming-field">
              <label for="year-input">Año</label>
              <input id="year-input" type="number" min="2000" max="2099" value="2026" />
            </div>
            <div class="naming-field">
              <label for="period-select">Período</label>
              <select id="period-select">
                <option value="1" selected>1</option>
                <option value="2">2</option>
                <option value="3">3</option>
              </select>
            </div>
          </div>
          <div class="naming-preview">
            <span class="naming-preview__label">Vista previa:</span>
            <code id="filename-preview">FIA2026-1.xlsx</code>
          </div>
        </div>
      </section>

      <div class="floating-actions">
        <button id="download-button" class="primary-button" disabled>
          ↓ Descargar XLSX
        </button>
        <button id="reset-button" class="secondary-button" disabled>
          Limpiar
        </button>
      </div>

      <section class="panel table-panel">
        <div class="table-panel__header">
          <h2>Vista previa</h2>
          <span id="table-caption">No hay datos todavía.</span>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Cod</th>
                <th>Secc</th>
                <th>Curso</th>
                <th>Tipo</th>
                <th>Horario</th>
                <th>Aula</th>
                <th>Docente</th>
              </tr>
            </thead>
            <tbody id="preview-body">
              <tr>
                <td colspan="7" class="empty-state empty-state--table">
                  Arrastra un archivo HTML para ver la tabla.
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
